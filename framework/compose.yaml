services:
  # Laravel Backend (PHP-FPM)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: laravel_api
    restart: unless-stopped
    tty: true
    volumes:
      - ./backend:/var/www
    networks:
      - app-network
    depends_on:
      - db

  # Nginx (Serves the API at http://localhost:8000)
  webserver:
    image: nginx:alpine
    container_name: nginx_server
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www
      - ./nginx/conf.d/:/etc/nginx/conf.d/
    networks:
      - app-network
    depends_on:
      - backend

  # Vite Frontend (Headless)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vite_frontend
    ports:
      - "5173:5173" # Vite default port
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - app-network

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: pgsql_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: laravel
      POSTGRES_USER: sail
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data # Added to keep your data safe!
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  pgdata: # This ensures your database isn't deleted when you stop Docker